name: Build & Deploy PlayArcadeX

on:
  push:
    branches: [main]
  schedule:
    # Reîmprospătează automat jocurile din feed în fiecare zi de luni la 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest games from GameMonetize
        run: node fetch-games.js --pages=3 --per=200 --max=1000
        continue-on-error: true   # daca feed-ul pica, folosim games.json din repo

      - name: Build static site
        run: node build.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
