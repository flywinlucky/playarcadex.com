name: Build & Deploy PlayArcadeX

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # NOTA: fetch-ul automat este DEZACTIVAT intentionat ca sa protejeze
      # baza PREMIUM curata manual (data/games.json din repo).
      # Ca sa improspatezi catalogul premium: extragi listele din RSS Builder,
      # rulezi local `node merge-premium.js <folder>` apoi commit + push.

      - name: Build static site
        run: node build.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
