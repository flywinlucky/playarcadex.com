<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <meta property="og:site_name" content="PlayArcadeX" />

    <script type="application/ld+json" id="websiteSchema">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "PlayArcadeX",
            "url": "https://playarcadex.com/",
            "description": "A fast web games platform for free HTML5 browser games.",
            "inLanguage": "en",
            "publisher": {
                "@type": "Organization",
                "name": "PlayArcadeX",
                "url": "https://playarcadex.com/"
            },
            "potentialAction": {
                "@type": "SearchAction",
                "target": "https://playarcadex.com/?q={search_term_string}",
                "query-input": "required name=search_term_string"
            }
        }

    <link rel="stylesheet" href="assets/css/styles.css" />
